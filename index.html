<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<!-- Sorgt dafür, dass es auf dem Handy wie eine App skaliert -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>WM 2026 TV</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #121212;
    color: #ffffff;
    margin: 0;
    padding: 16px;
  }
  h2 {
    margin: 0 0 16px 0;
    font-size: 20px;
    color: #e0e0e0;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #333;
    padding-bottom: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  td { 
    padding: 12px 4px; 
    border-bottom: 1px solid #222; 
    vertical-align: middle; 
  }
  .live { 
    color: #ff4d4d; 
    font-weight: bold; 
    animation: blink 2s infinite; 
  }
  .tv { 
    font-weight: bold; 
    color: #4db8ff; 
    text-align: right;
  }
  .match { 
    font-weight: 600; 
    font-size: 15px; 
  }
  .venue { 
    color: #888; 
    font-size: 12px; 
    margin-top: 3px;
  }
  .date-time { 
    white-space: nowrap; 
    color: #bbb;
  }
  
  @keyframes blink { 50% { opacity: 0.5; } }
</style>
</head>
<body>

<h2>WM 2026 TV-Plan</h2>
<table id="match-table">
  <!-- JavaScript füllt diese Tabelle automatisch -->
</table>

<script>
// Die Liste der Spiele. Hier kannst du das restliche Turnier nach demselben Muster ergänzen.
// Zeiten sind im ISO-Format (+02:00 steht für unsere Sommerzeit in Österreich).
 
  const matches = [
  { time: "2026-07-02T21:00:00+02:00", match: "Spanien – Österreich", tv: "ServusTV", venue: "Los Angeles" },
  { time: "2026-07-03T01:00:00+02:00", match: "Portugal – Kroatien", tv: "ServusTV", venue: "Toronto" },
  { time: "2026-07-03T05:00:00+02:00", match: "Schweiz – Algerien", tv: "ServusTV", venue: "Vancouver" },
  { time: "2026-07-03T20:00:00+02:00", match: "Australien – Ägypten", tv: "ORF 1", venue: "Dallas" },
  { time: "2026-07-04T00:00:00+02:00", match: "Argentinien – Kap Verde", tv: "ORF 1", venue: "Miami" },
  { time: "2026-07-04T03:30:00+02:00", match: "Kolumbien – Ghana", tv: "ORF 1", venue: "Kansas City" }
];

function renderMatches() {
  const now = new Date();
  // Wir blenden Spiele 110 Minuten (1h 50m) nach Anpfiff aus
  const matchDurationMs = 110 * 60 * 1000; 

  // 1. Vergangene Spiele herausfiltern
  const upcoming = matches.filter(m => {
    const matchTime = new Date(m.time);
    return (matchTime.getTime() + matchDurationMs) > now.getTime();
  });

  // 2. Auf exakt 8 Spiele für die perfekte Bildschirmgröße begrenzen
  const displayMatches = upcoming.slice(0, 8);
  const tbody = document.createElement("tbody");

  displayMatches.forEach(m => {
    const matchTime = new Date(m.time);
    // Ein Spiel gilt als "Live", wenn die Anstoßzeit erreicht, aber die 110 Minuten noch nicht um sind
    const isLive = matchTime <= now && (matchTime.getTime() + matchDurationMs) > now.getTime();
    
    const day = String(matchTime.getDate()).padStart(2, '0');
    const month = String(matchTime.getMonth() + 1).padStart(2, '0');
    const hours = String(matchTime.getHours()).padStart(2, '0');
    const minutes = String(matchTime.getMinutes()).padStart(2, '0');
    
    const timeHtml = isLive 
      ? '<span class="live">🔴 LIVE</span>' 
      : `${day}.${month}.<br>${hours}:${minutes}`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="date-time">${timeHtml}</td>
      <td>
        <div class="match">${m.match}</div>
        <div class="venue">${m.venue}</div>
      </td>
      <td class="tv">${m.tv}</td>
    `;
    tbody.appendChild(tr);
  });

  const table = document.getElementById("match-table");
  table.innerHTML = "";
  table.appendChild(tbody);
}

// Sofort beim Öffnen laden
renderMatches();

// Alle 60 Sekunden aktualisieren. So verschwinden Spiele automatisch, wenn du die App offen lässt.
setInterval(renderMatches, 60000);
</script>
</body>
</html>
